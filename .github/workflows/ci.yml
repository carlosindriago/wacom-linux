name: Wacom Linux CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🛡️ Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          ignore_names: 'GUIA_WACOM_ZURDO.md'

  test:
    name: 🧪 Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup permissions
        run: chmod +x ./*.sh ./tests/*.sh
      - name: Run Logic Tests
        run: ./tests/test_logic.sh
